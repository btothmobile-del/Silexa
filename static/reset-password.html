<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silexa – Új jelszó</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:420px;padding-top:48px">
  <div class="hero-logo" style="font-size:2rem;margin-bottom:8px">Silexa</div>
  <h2 style="color:#f1f5f9;margin-bottom:8px">Új jelszó beállítása</h2>

  <div id="formSection">
    <input type="password" id="pw1" placeholder="Új jelszó" class="input" style="width:100%;margin-bottom:12px;box-sizing:border-box">
    <input type="password" id="pw2" placeholder="Jelszó megerősítése" class="input" style="width:100%;margin-bottom:12px;box-sizing:border-box">
    <button class="btn full" onclick="doReset()">Jelszó mentése</button>
    <div id="errMsg" style="display:none;color:#f87171;margin-top:12px;font-size:0.9rem"></div>
  </div>

  <div id="successSection" style="display:none;text-align:center;padding:24px 0">
    <div style="font-size:2.5rem;margin-bottom:12px">✅</div>
    <p style="color:#f1f5f9;font-weight:600">Jelszó sikeresen megváltoztatva!</p>
    <p style="color:#64748b;font-size:0.9rem;margin-bottom:20px">Automatikusan bejelentkeztetünk...</p>
  </div>

  <div id="invalidSection" style="display:none;text-align:center;padding:24px 0">
    <div style="font-size:2.5rem;margin-bottom:12px">⏰</div>
    <p style="color:#f1f5f9;font-weight:600">A link érvénytelen vagy lejárt</p>
    <a href="forgot-password.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none">Új visszaállítási link kérése</a>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");

  if (!token) {
    document.getElementById("formSection").style.display = "none";
    document.getElementById("invalidSection").style.display = "block";
  }

  async function doReset() {
    const pw1 = document.getElementById("pw1").value;
    const pw2 = document.getElementById("pw2").value;
    const errEl = document.getElementById("errMsg");
    errEl.style.display = "none";

    if (!pw1 || pw1.length < 6) {
      errEl.textContent = "A jelszónak legalább 6 karakter hosszúnak kell lennie.";
      errEl.style.display = "block";
      return;
    }
    if (pw1 !== pw2) {
      errEl.textContent = "A két jelszó nem egyezik.";
      errEl.style.display = "block";
      return;
    }

    try {
      const res = await fetch("/api/auth/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password: pw1 }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 400) {
          document.getElementById("formSection").style.display = "none";
          document.getElementById("invalidSection").style.display = "block";
        } else {
          errEl.textContent = data.detail || "Hiba történt.";
          errEl.style.display = "block";
        }
        return;
      }
      localStorage.setItem("silexa_token", data.token);
      localStorage.setItem("silexa_email", data.email);
      document.getElementById("formSection").style.display = "none";
      document.getElementById("successSection").style.display = "block";
      setTimeout(() => { window.location.href = "app.html"; }, 1500);
    } catch {
      errEl.textContent = "Szerver hiba. Próbáld újra.";
      errEl.style.display = "block";
    }
  }
</script>
</body>
</html>
