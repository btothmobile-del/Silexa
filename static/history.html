<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silexa – Előzmények</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Előzmények</h1>
  <p class="subtitle">Korábbi napok összefoglalói</p>

  <div id="loadingEl" class="card generate-card">
    <div class="spinner"></div> Betöltés...
  </div>

  <div id="emptyEl" class="card generate-card" style="display:none">
    <p>Még nincsenek korábbi összefoglalók.<br>Menj a főoldalra és generálj egyet!</p>
    <a href="index.html" class="btn" style="display:inline-block;margin-top:16px;text-decoration:none">🏠 Főoldal</a>
  </div>

  <div id="historyList"></div>

  <!-- Mini lejátszó -->
  <div id="miniPlayer" style="display:none;position:fixed;bottom:68px;left:0;right:0;background:#1e293b;border-top:1px solid #4f46e5;padding:12px 16px;z-index:40">
    <div style="max-width:700px;margin:0 auto">
      <div style="font-size:0.78rem;color:#6366f1;margin-bottom:4px" id="miniDate"></div>
      <div style="display:flex;align-items:center;gap:12px">
        <button class="play-circle" id="miniPlayBtn" onclick="toggleMiniPlay()" style="width:44px;height:44px;font-size:1.2rem;margin:0;flex-shrink:0">▶</button>
        <div style="flex:1">
          <div class="progress-bar" id="miniProgressBar" onclick="seekMiniAudio(event)" style="margin:0">
            <div class="progress-fill" id="miniProgressFill"></div>
          </div>
          <div class="time-row" style="margin-top:4px">
            <span id="miniCurrentTime">0:00</span>
            <span id="miniTotalTime">0:00</span>
          </div>
        </div>
        <button onclick="closeMiniPlayer()" style="background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer">✕</button>
      </div>
    </div>
  </div>
</div>

<nav>
  <a href="index.html"><span class="icon">🏠</span>Ma</a>
  <a href="history.html" class="active"><span class="icon">📚</span>Előzmények</a>
  <a href="settings.html"><span class="icon">⚙️</span>Beállítások</a>
  <a href="#" onclick="logout();return false;"><span class="icon">🚪</span>Kilépés</a>
</nav>

<script src="app.js"></script>
<script>
  requireAuth();

  let currentAudio = null;
  let currentDate = null;

  async function init() {
    try {
      const res = await apiFetch("/api/briefings");
      const data = await res.json();
      document.getElementById("loadingEl").style.display = "none";

      if (!data.briefings.length) {
        document.getElementById("emptyEl").style.display = "block";
        return;
      }

      renderHistory(data.briefings);
    } catch (e) {
      document.getElementById("loadingEl").innerHTML = "Hiba: " + e.message;
    }
  }

  function renderHistory(briefings) {
    const list = document.getElementById("historyList");
    list.innerHTML = briefings.map(b => {
      const d = new Date(b.date);
      const dateStr = d.toLocaleDateString("hu-HU", {
        year: "numeric", month: "long", day: "numeric", weekday: "long"
      });
      const interests = b.interests.join(", ");
      return `
        <div class="history-item" id="item-${b.date}" onclick="openBriefing('${b.date}')">
          <div style="flex:1;min-width:0">
            <div class="history-meta">${b.language} · ${interests}</div>
            <div class="history-date">${dateStr}</div>
            <div class="history-preview">${b.preview}</div>
          </div>
          ${b.has_audio ? `<button class="history-play" onclick="event.stopPropagation();playBriefing('${b.date}')" title="Lejátszás">▶</button>` : ""}
        </div>
      `;
    }).join("");
  }

  async function openBriefing(dateStr) {
    // Kinyitja a teljes szöveget a kártyán
    const res = await fetch(`/api/briefings/${dateStr}`);
    if (!res.ok) return;
    const data = await res.json();

    const existing = document.getElementById(`detail-${dateStr}`);
    if (existing) {
      existing.remove();
      return;
    }

    const detail = document.createElement("div");
    detail.id = `detail-${dateStr}`;
    detail.className = "card";
    detail.style.marginBottom = "12px";
    detail.style.marginTop = "-8px";
    detail.innerHTML = `
      <div style="font-size:0.83rem;line-height:1.7;color:#94a3b8">${data.script.replace(/\n/g, "<br>")}</div>
    `;

    const item = document.getElementById(`item-${dateStr}`);
    item.insertAdjacentElement("afterend", detail);
  }

  function playBriefing(dateStr) {
    if (currentDate === dateStr && currentAudio && !currentAudio.paused) {
      currentAudio.pause();
      document.getElementById("miniPlayBtn").textContent = "▶";
      document.getElementById("miniPlayBtn").classList.remove("playing");
      return;
    }

    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }

    currentDate = dateStr;
    const d = new Date(dateStr);
    document.getElementById("miniDate").textContent =
      d.toLocaleDateString("hu-HU", { year: "numeric", month: "long", day: "numeric", weekday: "long" });

    currentAudio = new Audio(`/api/briefings/${dateStr}/audio`);
    currentAudio.addEventListener("timeupdate", () => {
      const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
      document.getElementById("miniProgressFill").style.width = pct + "%";
      document.getElementById("miniCurrentTime").textContent = formatTime(currentAudio.currentTime);
    });
    currentAudio.addEventListener("loadedmetadata", () => {
      document.getElementById("miniTotalTime").textContent = formatTime(currentAudio.duration);
    });
    currentAudio.addEventListener("ended", () => {
      document.getElementById("miniPlayBtn").textContent = "▶";
      document.getElementById("miniPlayBtn").classList.remove("playing");
    });

    currentAudio.play();
    document.getElementById("miniPlayer").style.display = "block";
    document.getElementById("miniPlayBtn").textContent = "⏸";
    document.getElementById("miniPlayBtn").classList.add("playing");
  }

  function toggleMiniPlay() {
    if (!currentAudio) return;
    const btn = document.getElementById("miniPlayBtn");
    if (currentAudio.paused) {
      currentAudio.play();
      btn.textContent = "⏸";
      btn.classList.add("playing");
    } else {
      currentAudio.pause();
      btn.textContent = "▶";
      btn.classList.remove("playing");
    }
  }

  function seekMiniAudio(e) {
    if (!currentAudio || !currentAudio.duration) return;
    const bar = document.getElementById("miniProgressBar");
    const rect = bar.getBoundingClientRect();
    currentAudio.currentTime = ((e.clientX - rect.left) / rect.width) * currentAudio.duration;
  }

  function closeMiniPlayer() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    document.getElementById("miniPlayer").style.display = "none";
    currentDate = null;
  }

  function formatTime(sec) {
    if (isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }

  init();
</script>
</body>
</html>
