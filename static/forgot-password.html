<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silexa – Elfelejtett jelszó</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width:420px;padding-top:48px">
  <div class="hero-logo" style="font-size:2rem;margin-bottom:8px">Silexa</div>
  <h2 style="color:#f1f5f9;margin-bottom:8px">Elfelejtett jelszó</h2>
  <p style="color:#64748b;margin-bottom:28px;font-size:0.9rem">Add meg az email címed és küldünk egy visszaállítási linket.</p>

  <div id="formSection">
    <input type="email" id="emailInput" placeholder="Email cím" style="width:100%;background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:10px 12px;font-size:1rem;box-sizing:border-box;margin-bottom:12px">
    <button class="btn full" onclick="doForgot()">Visszaállítási link küldése</button>
    <div id="errMsg" style="display:none;color:#f87171;margin-top:12px;font-size:0.9rem"></div>
  </div>

  <div id="successSection" style="display:none;text-align:center;padding:24px 0">
    <div style="font-size:2.5rem;margin-bottom:12px">📬</div>
    <p style="color:#f1f5f9;font-weight:600">Email elküldve!</p>
    <p style="color:#64748b;font-size:0.9rem">Ellenőrizd a postaládád (és a spam mappát is). A link 15 percig érvényes.</p>
  </div>

  <div style="margin-top:24px;text-align:center">
    <a href="login.html" style="color:#6366f1;font-size:0.9rem;text-decoration:none">← Vissza a bejelentkezéshez</a>
  </div>
</div>

<script>
  async function doForgot() {
    const email = document.getElementById("emailInput").value.trim();
    const errEl = document.getElementById("errMsg");
    errEl.style.display = "none";
    if (!email) { errEl.textContent = "Add meg az email címedet."; errEl.style.display = "block"; return; }
    try {
      const res = await fetch("/api/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      if (!res.ok) {
        const d = await res.json();
        errEl.textContent = d.detail || "Hiba történt.";
        errEl.style.display = "block";
        return;
      }
      document.getElementById("formSection").style.display = "none";
      document.getElementById("successSection").style.display = "block";
    } catch {
      errEl.textContent = "Szerver hiba. Próbáld újra.";
      errEl.style.display = "block";
    }
  }

  document.getElementById("emailInput").addEventListener("keydown", e => {
    if (e.key === "Enter") doForgot();
  });
</script>
</body>
</html>
